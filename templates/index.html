<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Bombing Who?</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
        }

        #map { width: 100vw; height: 100vh; }

        .conflict-marker {
            background: transparent !important;
            border: none !important;
        }

        .conflict-dot {
            width: 14px; height: 14px;
            background: #ff2d2d;
            border-radius: 50%;
            border: 2px solid #ff6b6b;
            box-shadow: 0 0 12px #ff2d2d, 0 0 24px rgba(255, 45, 45, 0.4);
            animation: pulse 2s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; }
        }

        #sidebar {
            position: fixed;
            top: 0; right: -420px;
            width: 420px; height: 100vh;
            background: #141414;
            border-left: 1px solid #2a2a2a;
            z-index: 1000;
            transition: right 0.3s ease;
            overflow-y: auto;
            padding: 24px;
        }
        #sidebar.open { right: 0; }

        #sidebar-close {
            position: absolute; top: 16px; right: 16px;
            background: none; border: none;
            color: #888; font-size: 24px; cursor: pointer;
        }
        #sidebar-close:hover { color: #fff; }

        #sidebar h2 { font-size: 20px; color: #ff6b6b; margin-bottom: 4px; padding-right: 30px; }

        .status-badge {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 600; text-transform: uppercase; margin: 8px 0 16px;
        }
        .status-active { background: #3d1111; color: #ff4444; }
        .status-escalating { background: #3d2911; color: #ff8844; }
        .status-ceasefire { background: #11333d; color: #44aaff; }
        .status-de-escalating { background: #113d1e; color: #44ff66; }

        .detail-section { margin-bottom: 20px; }
        .detail-section h3 {
            font-size: 12px; text-transform: uppercase; color: #666;
            margin-bottom: 6px; letter-spacing: 0.5px;
        }

        .parties { display: flex; flex-wrap: wrap; gap: 6px; }
        .party-tag {
            background: #1e1e1e; border: 1px solid #333;
            padding: 4px 10px; border-radius: 4px; font-size: 13px;
        }

        .summary-text { font-size: 14px; line-height: 1.6; color: #ccc; }
        .casualties-text { font-size: 14px; color: #ff8888; }

        #impact-section { border-top: 1px solid #2a2a2a; padding-top: 16px; margin-top: 16px; }
        #impact-content { font-size: 14px; line-height: 1.6; color: #ccc; }
        #impact-loading { color: #666; font-style: italic; }

        #header {
            position: fixed; top: 0; left: 0; right: 0; height: 48px;
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 999; border-bottom: 1px solid #1a1a1a;
        }
        #header h1 { font-size: 16px; font-weight: 600; color: #ff6b6b; }
        #header-right { display: flex; align-items: center; gap: 16px; }
        #last-updated { font-size: 11px; color: #555; }
        #demo-badge {
            background: #3d2911; color: #ff8844; font-size: 11px; font-weight: 600;
            padding: 2px 8px; border-radius: 4px; display: none;
        }
        #conflict-count { font-size: 12px; color: #888; }
        .header-btn {
            background: none; border: 1px solid #333; color: #888;
            padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        .header-btn:hover { border-color: #555; color: #ccc; }

        #loading {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 10, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }
        #loading.hidden { display: none; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #222;
            border-top-color: #ff4444; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { margin-top: 16px; color: #666; font-size: 14px; }

        #settings-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); display: none;
            align-items: center; justify-content: center; z-index: 3000;
        }
        #settings-modal.open { display: flex; }
        .modal-content {
            background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
            padding: 28px; width: 400px; max-width: 90vw;
        }
        .modal-content h2 { font-size: 18px; margin-bottom: 20px; color: #e0e0e0; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 12px; text-transform: uppercase;
            color: #666; margin-bottom: 6px; letter-spacing: 0.5px;
        }
        .form-group input, .form-group textarea {
            width: 100%; background: #0e0e0e; border: 1px solid #333;
            color: #e0e0e0; padding: 8px 12px; border-radius: 4px;
            font-size: 14px; font-family: inherit;
        }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #ff6b6b; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-save {
            background: #ff4444; color: white; border: none;
            padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
        .btn-save:hover { background: #ff5555; }
        .btn-cancel {
            background: none; border: 1px solid #333; color: #888;
            padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
    </style>
</head>
<body>

<div id="header">
    <h1>Who's Bombing Who?</h1>
    <div id="header-right">
        <span id="demo-badge">DEMO</span>
        <span id="conflict-count"></span>
        <span id="last-updated"></span>
        <button class="header-btn" onclick="openSettings()">Settings</button>
    </div>
</div>

<div id="map"></div>

<div id="sidebar">
    <button id="sidebar-close" onclick="closeSidebar()">&times;</button>
    <h2 id="conflict-name"></h2>
    <span id="conflict-status" class="status-badge"></span>
    <div class="detail-section">
        <h3>Parties</h3>
        <div id="conflict-parties" class="parties"></div>
    </div>
    <div class="detail-section">
        <h3>Location</h3>
        <p id="conflict-location" class="summary-text"></p>
    </div>
    <div class="detail-section">
        <h3>Casualties</h3>
        <p id="conflict-casualties" class="casualties-text"></p>
    </div>
    <div class="detail-section">
        <h3>Summary</h3>
        <p id="conflict-summary" class="summary-text"></p>
    </div>
    <div id="impact-section" class="detail-section">
        <h3>How does this affect me?</h3>
        <p id="impact-loading">Analyzing personal impact...</p>
        <div id="impact-content"></div>
    </div>
</div>

<div id="loading">
    <div class="spinner"></div>
    <p>Scanning global conflicts...</p>
</div>

<div id="settings-modal">
    <div class="modal-content">
        <h2>Your Profile</h2>
        <p style="color: #666; font-size: 13px; margin-bottom: 16px;">
            Help personalize impact analysis. All data stays local.
        </p>
        <div class="form-group">
            <label>Where do you live?</label>
            <input type="text" id="profile-location" placeholder="e.g., Bangalore, India">
        </div>
        <div class="form-group">
            <label>Upcoming travel (optional)</label>
            <textarea id="profile-travel" placeholder="e.g., Flying to London in April, transit through Dubai"></textarea>
        </div>
        <div class="form-group">
            <label>Interests / concerns (optional)</label>
            <textarea id="profile-interests" placeholder="e.g., oil prices, tech supply chain, coffee imports"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
            <button class="btn-save" onclick="saveProfile()">Save</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Country centroids for drawing arc lines between conflict parties
    const COUNTRY_COORDS = {
        "russia": [61.5, 105.3],
        "ukraine": [48.4, 31.2],
        "israel": [31.0, 34.8],
        "palestine": [31.9, 35.2],
        "hamas": [31.4, 34.3],
        "sudan": [15.5, 32.5],
        "myanmar": [19.8, 96.1],
        "ethiopia": [9.1, 40.5],
        "burkina faso": [12.3, -1.6],
        "mali": [17.6, -4.0],
        "niger": [17.6, 8.1],
        "dr congo": [-4.0, 21.8],
        "drc": [-4.0, 21.8],
        "rwanda": [-1.9, 29.9],
        "chad": [15.5, 18.7],
        "south sudan": [6.9, 31.3],
        "saudi arabia": [23.9, 45.1],
        "iran": [32.4, 53.7],
        "yemen": [15.6, 48.5],
        "syria": [35.0, 38.5],
        "iraq": [33.2, 43.7],
        "libya": [26.3, 17.2],
        "somalia": [5.2, 46.2],
        "afghanistan": [33.9, 67.7],
        "pakistan": [30.4, 69.3],
        "india": [20.6, 79.0],
        "china": [35.9, 104.2],
        "usa": [37.1, -95.7],
        "turkey": [38.9, 35.2],
        "egypt": [26.8, 30.8],
        "nigeria": [9.1, 8.7],
        "cameroon": [7.4, 12.4],
        "mozambique": [-18.7, 35.5],
        "colombia": [4.6, -74.3],
        "mexico": [23.6, -102.6],
    };

    function findPartyCoords(partyName) {
        const lower = partyName.toLowerCase();
        // Direct match
        if (COUNTRY_COORDS[lower]) return COUNTRY_COORDS[lower];
        // Partial match — check if any country name is in the party string
        for (const [country, coords] of Object.entries(COUNTRY_COORDS)) {
            if (lower.includes(country)) return coords;
        }
        return null;
    }

    // Generate curved arc points between two lat/lng pairs
    function arcPoints(from, to, numPoints) {
        const points = [];
        const midLat = (from[0] + to[0]) / 2;
        const midLng = (from[1] + to[1]) / 2;
        // Offset the midpoint perpendicular to the line for curvature
        const dx = to[1] - from[1];
        const dy = to[0] - from[0];
        const dist = Math.sqrt(dx * dx + dy * dy);
        const offset = dist * 0.2;
        const controlLat = midLat + (dx / dist) * offset;
        const controlLng = midLng - (dy / dist) * offset;

        for (let i = 0; i <= numPoints; i++) {
            const t = i / numPoints;
            const lat = (1-t)*(1-t)*from[0] + 2*(1-t)*t*controlLat + t*t*to[0];
            const lng = (1-t)*(1-t)*from[1] + 2*(1-t)*t*controlLng + t*t*to[1];
            points.push([lat, lng]);
        }
        return points;
    }

    // --- Map ---
    const map = L.map('map', {
        center: [20, 30],
        zoom: 3,
        minZoom: 2,
        worldCopyJump: true,
        zoomControl: false,
        attributionControl: false,
    });

    L.control.zoom({ position: 'bottomleft' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
    }).addTo(map);

    let markers = [];
    let arcLines = [];
    let conflicts = [];

    async function loadConflicts() {
        try {
            const res = await fetch('/api/conflicts');
            const data = await res.json();
            conflicts = data.conflicts || [];

            document.getElementById('conflict-count').textContent = `${conflicts.length} active conflicts`;

            if (data.demo) {
                document.getElementById('demo-badge').style.display = 'inline';
                document.getElementById('last-updated').textContent = 'Sample data — add API key for live';
            } else {
                const ts = data.timestamp;
                if (ts) {
                    const d = new Date(ts * 1000);
                    document.getElementById('last-updated').textContent = `Updated ${d.toLocaleTimeString()}`;
                }
            }

            renderMarkers();
            document.getElementById('loading').classList.add('hidden');
        } catch (err) {
            console.error('Failed to load conflicts:', err);
            document.querySelector('#loading p').textContent = 'Failed to load data. Is the server running?';
        }
    }

    function renderMarkers() {
        markers.forEach(m => map.removeLayer(m));
        arcLines.forEach(l => map.removeLayer(l));
        markers = [];
        arcLines = [];

        conflicts.forEach(conflict => {
            const loc = conflict.location;
            if (!loc || loc.lat == null || loc.lng == null) return;

            const icon = L.divIcon({
                className: 'conflict-marker',
                html: '<div class="conflict-dot"></div>',
                iconSize: [14, 14],
                iconAnchor: [7, 7],
            });

            const marker = L.marker([loc.lat, loc.lng], { icon })
                .addTo(map)
                .on('click', () => showConflict(conflict));

            marker.bindTooltip(conflict.name, { direction: 'top', offset: [0, -10] });
            markers.push(marker);

            // Draw arc lines between parties that have known coordinates
            const partyCoords = conflict.parties
                .map(p => findPartyCoords(p))
                .filter(c => c !== null);

            // Draw arcs between each pair of parties
            for (let i = 0; i < partyCoords.length; i++) {
                for (let j = i + 1; j < partyCoords.length; j++) {
                    const from = partyCoords[i];
                    const to = partyCoords[j];
                    // Skip if the two points are very close (same country / same conflict zone)
                    const dist = Math.abs(from[0] - to[0]) + Math.abs(from[1] - to[1]);
                    if (dist < 3) continue;

                    const points = arcPoints(from, to, 30);
                    const line = L.polyline(points, {
                        color: '#ff4444',
                        weight: 1.5,
                        opacity: 0.25,
                        dashArray: '6, 8',
                        interactive: false,
                    }).addTo(map);
                    arcLines.push(line);
                }
            }
        });

        if (markers.length > 0) {
            const group = L.featureGroup(markers);
            map.fitBounds(group.getBounds().pad(0.3));
        }
    }

    function showConflict(conflict) {
        document.getElementById('conflict-name').textContent = conflict.name;
        const statusEl = document.getElementById('conflict-status');
        statusEl.textContent = conflict.status;
        statusEl.className = 'status-badge status-' + conflict.status;

        document.getElementById('conflict-parties').innerHTML = conflict.parties
            .map(p => `<span class="party-tag">${p}</span>`).join('');

        const loc = conflict.location;
        document.getElementById('conflict-location').textContent =
            `${loc.region ? loc.region + ', ' : ''}${loc.country}`;
        document.getElementById('conflict-casualties').textContent = conflict.casualties || 'Unknown';
        document.getElementById('conflict-summary').textContent = conflict.summary;

        document.getElementById('impact-content').innerHTML = '';
        document.getElementById('impact-loading').style.display = 'block';
        document.getElementById('sidebar').classList.add('open');
        fetchImpact(conflict.id);
    }

    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

    async function fetchImpact(conflictId) {
        try {
            const res = await fetch('/api/impact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ conflict_id: conflictId }),
            });
            const data = await res.json();
            document.getElementById('impact-loading').style.display = 'none';
            document.getElementById('impact-content').innerHTML = formatMarkdown(data.impact);
        } catch (err) {
            document.getElementById('impact-loading').textContent = 'Failed to load impact analysis.';
        }
    }

    function formatMarkdown(text) {
        return text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/^\s*[-•]\s+(.+)$/gm, '<li>$1</li>')
            .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
            .replace(/\n{2,}/g, '<br><br>')
            .replace(/\n/g, '<br>');
    }

    async function openSettings() {
        try {
            const res = await fetch('/api/profile');
            const profile = await res.json();
            document.getElementById('profile-location').value = profile.location || '';
            document.getElementById('profile-travel').value = profile.travel || '';
            document.getElementById('profile-interests').value = profile.interests || '';
        } catch (e) {}
        document.getElementById('settings-modal').classList.add('open');
    }

    function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }

    async function saveProfile() {
        const profile = {
            location: document.getElementById('profile-location').value,
            travel: document.getElementById('profile-travel').value,
            interests: document.getElementById('profile-interests').value,
        };
        await fetch('/api/profile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(profile),
        });
        closeSettings();
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeSidebar(); closeSettings(); }
    });
    document.getElementById('settings-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeSettings();
    });

    loadConflicts();
</script>
</body>
</html>
